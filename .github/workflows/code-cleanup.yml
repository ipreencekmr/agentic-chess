name: Monthly Code Cleanup and Refactor

on:
  schedule:
    - cron: '30 4 25 * *'  # 25th of every month at 04:30 UTC = 10:00 AM IST
  workflow_dispatch:       # Allow manual trigger from Actions tab
    inputs:
      dry_run:
        description: 'Preview changes without writing files or opening a PR'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  code-cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          pip install openai langsmith gitpython

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Run ESLint (collect warnings for agent context)
        working-directory: frontend
        continue-on-error: true
        run: |
          npx eslint src --ext .js,.jsx --format json > ../eslint-report.json || true

      - name: Run Ruff (collect Python lint warnings for agent context)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check . --output-format json > ruff-report.json || true

      - name: Run cleanup agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_PROJECT: 'Chess'
          CLEANUP_MODEL: ${{ vars.CLEANUP_MODEL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/cleanup_agent.py

      - name: Check pr_body.md was produced
        id: check_body
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -s pr_body.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "[info] pr_body.md found ($(wc -c < pr_body.md) bytes)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "[warn] pr_body.md is missing or empty — PR will be skipped"
          fi

      - name: Create Pull Request
        if: ${{ github.event.inputs.dry_run != 'true' && steps.check_body.outputs.exists == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "refactor: weekly automated code cleanup"
          branch: auto/code-cleanup-${{ github.run_id }}
          title: "Auto: Weekly Code Cleanup and Refactor"
          body-path: pr_body.md
          add-paths: |
            backend/**
            frontend/src/**
          labels: ai-generated, refactor
          draft: true