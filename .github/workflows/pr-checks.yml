name: PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Extract YAML front-matter from README
        run: |
          awk 'NR==1 && $0=="---" {flag=1; next}
               flag && $0=="---" {flag=0; exit}
               flag {print}' README.md > readme_meta.yml

          echo "Extracted YAML:"
          cat readme_meta.yml

      - name: Lint extracted YAML
        run: yamllint readme_meta.yml

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: yamllint
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docker-build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: codeql-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t agentic-chess-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t agentic-chess-frontend:ci .

      - name: Build Hugging Face root image
        run: docker build -t agentic-chess-hf:ci .

      - name: Start backend container
        run: |
          docker run -d --name chess-backend-ci -p 8000:8000 agentic-chess-backend:ci

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "Backend health endpoint did not become ready in time."
          docker logs chess-backend-ci || true
          exit 1

      - name: Container logs (always)
        if: always()
        run: docker logs chess-backend-ci || true

      - name: Cleanup container
        if: always()
        run: docker rm -f chess-backend-ci || true

