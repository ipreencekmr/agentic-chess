name: Deploy To Hugging Face Space

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_SPACE_ID}" ]; then
            echo "HF_TOKEN and HF_SPACE_ID secrets are required."
            exit 1
          fi

          git lfs install
          HF_DIR="/tmp/hf-space"
          rm -rf "${HF_DIR}"
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" "${HF_DIR}"

          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "__pycache__/" \
            --exclude "frontend/node_modules/" \
            --exclude "frontend/dist/" \
            ./ "${HF_DIR}/"

          cd "${HF_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy from GitHub Actions (${GITHUB_SHA})"
          git push
